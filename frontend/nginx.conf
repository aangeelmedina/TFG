server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Archivos estáticos: servir directamente
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: todas las rutas desconocidas devuelven index.html
    # El frontend llama al backend usando VITE_API_URL (URL absoluta),
    # por lo que NO se necesita proxy. Funciona igual en Docker local y Railway.
    location / {
        try_files $uri $uri/ /index.html;
    }
}